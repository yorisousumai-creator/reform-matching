<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件登録 - 内部管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      margin-bottom: 10px;
      color: #333;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }
    .required {
      color: red;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 15px;
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    .note {
      font-size: 13px;
      color: #666;
      margin-top: 5px;
      font-style: italic;
    }
    button {
      background-color: #4caf50;
      color: #fff;
      padding: 15px 40px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button:hover {
      background-color: #43a047;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .message {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }
    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .divider {
      border: none;
      border-top: 2px solid #eee;
      margin: 30px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 案件登録フォーム（簡易版）</h1>
    <p class="subtitle">ミツモアなどから受け取った情報を登録してください。詳細は後でダッシュボードから追加できます。</p>
    
    <div id="message" class="message"></div>
    
    <form id="caseForm">
      <!-- 必須情報のみ -->
      <div class="form-group">
        <label>顧客名 <span class="required">*</span></label>
        <input type="text" name="customer_name" required placeholder="例：山田太郎">
      </div>
      
      <div class="form-group">
        <label>都道府県 <span class="required">*</span></label>
        <select name="prefecture" required>
          <option value="">選択してください</option>
          <option value="東京都">東京都</option>
          <option value="神奈川県">神奈川県</option>
          <option value="埼玉県">埼玉県</option>
          <option value="千葉県">千葉県</option>
          <option value="その他">その他</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>市区町村 <span class="required">*</span></label>
        <input type="text" name="city" required placeholder="例：新宿区">
      </div>
      
      <div class="form-group">
        <label>リフォーム箇所 <span class="required">*</span></label>
        <input type="text" name="reform_type" required placeholder="例：キッチン、浴室、外壁塗装、内装工事など">
        <div class="note">※ 複数箇所の場合は「キッチン、浴室」のように入力してください</div>
      </div>
      
      <hr class="divider">
      
      <!-- 任意情報 -->
      <div class="form-group">
        <label>詳細・要望</label>
        <textarea name="details" placeholder="ミツモアの案件詳細などをコピペしてください&#13;&#10;&#13;&#10;例：&#13;&#10;・築年数：25年&#13;&#10;・希望工期：2ヶ月以内&#13;&#10;・予算：100万円前後"></textarea>
        <div class="note">※ 電話番号、メール、予算などの詳細情報は後でダッシュボードから追加できます</div>
      </div>
      
      <div class="form-group">
        <label>優先度</label>
        <select name="priority">
          <option value="通常">通常</option>
          <option value="高">高</option>
          <option value="至急">至急</option>
        </select>
      </div>
      
      <button type="submit" id="submitBtn">案件を登録</button>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    
    // ⚠️ 重要：ここに正しいSupabase情報を設定してください
    const SUPABASE_URL = 'https://phkfsozxquabtzajmqwh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoa2Zzb3p4cXVhYnR6YWptcXdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MTM5NzgsImV4cCI6MjA4NDM4OTk3OH0.Ygg-Ym8Kf1jgU_HuyBXjcig0xkw-Ip8vpFDaucog2YQ';  // ← eyJ で始まる正しいキーに変更！
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const form = document.getElementById('caseForm');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      submitBtn.textContent = '登録中...';
      
      const formData = new FormData(form);
      
      // 最小限のデータで登録
      const data = {
  customer_name: formData.get('customer_name'),
  prefecture: formData.get('prefecture'),
  city: formData.get('city'),
  reform_type: formData.get('reform_type'),
  details: formData.get('details') || null,
  priority: formData.get('priority') || '通常',
  
  // 必須項目のデフォルト値を null に変更
  customer_phone: null,   // ← 変更
  customer_email: null,   // ← 変更
  postal_code: null,      // ← 変更
  
  // システム項目
  source: 'ミツモア',
  status: '新規',
  is_serviceable: true
};
      
      try {
        const { error } = await supabase
          .from('inquiries')
          .insert([data]);
        
        if (error) throw error;
        
        message.className = 'message success';
        message.textContent = '✓ 案件を登録しました！詳細情報はダッシュボードから追加できます。';
        message.style.display = 'block';
        
        form.reset();
        
        setTimeout(() => {
          message.style.display = 'none';
        }, 5000);
        
      } catch (error) {
        console.error('エラー:', error);
        message.className = 'message error';
        message.textContent = '✗ 登録に失敗しました: ' + error.message;
        message.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '案件を登録';
      }
    });
  </script>
</body>
</html>
